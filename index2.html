<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artisun</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:#0a0402;
    color:#f5ece0;
    font-family:'Georgia','Times New Roman',serif;
    overflow-x:hidden;
  }

  /* ===================== LOADER ===================== */
  #loader{
    position:fixed;
    inset:0;
    z-index:9999;
    background:
      radial-gradient(ellipse 70% 60% at 50% 0%, #ffb84d 0%, #ff7a1a 18%, #d6300f 42%, #4a0a04 72%, #150402 100%);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #loader-line-guide{
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:1px;
    background:rgba(255,235,210,0.18);
    transform:translateX(-50%);
  }

  #loader-line-top, #loader-line-bottom{
    position:absolute;
    left:50%;
    width:2px;
    transform:translateX(-50%);
    background:linear-gradient(180deg, rgba(255,245,220,0) 0%, rgba(255,225,170,0.9) 85%, #fff6e0 100%);
    box-shadow:0 0 14px 2px rgba(255,200,120,0.7);
  }
  #loader-line-top{ top:0; height:0%; }
  #loader-line-bottom{
    bottom:0;
    height:0%;
    background:linear-gradient(0deg, rgba(255,245,220,0) 0%, rgba(255,225,170,0.9) 85%, #fff6e0 100%);
  }

  .loader-tick{
    position:absolute;
    left:50%;
    transform:translate(-50%, -50%);
    font-family:Arial, sans-serif;
    font-size:.7rem;
    letter-spacing:1px;
    color:rgba(255,240,220,0.65);
    opacity:0;
    transition:opacity .4s ease;
  }
  #tick-0, #tick-100{ top:50%; }
  .loader-tick::before{
    content:"";
    position:absolute;
    left:-14px;
    top:50%;
    width:8px;
    height:1px;
    background:rgba(255,235,210,0.6);
  }

  #loader-content{
    position:relative;
    z-index:2;
    text-align:center;
  }
  #loader-title{
    font-size:5.5rem;
    font-weight:400;
    letter-spacing:1px;
    color:#fffaf0;
    text-shadow: 0 0 50px rgba(255,170,60,0.55);
  }
  #loader-divider{
    margin-top:1.2rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1rem;
  }
  #loader-divider span{
    font-family:Arial, sans-serif;
    font-size:.7rem;
    letter-spacing:4px;
    color:rgba(255,240,225,0.75);
  }
  #loader-divider .dash{
    width:90px;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,235,210,0.7));
  }
  #loader-divider .dash.right{
    background:linear-gradient(90deg, rgba(255,235,210,0.7), transparent);
  }

  #loader.fade-out{
    animation: loaderFade2 1.1s cubic-bezier(.65,0,.35,1) forwards;
  }
  @keyframes loaderFade2{
    0%{ opacity:1; filter:blur(0px); }
    60%{ opacity:1; filter:blur(6px); }
    100%{ opacity:0; filter:blur(24px); transform:scale(1.08); }
  }

  /* ===================== SITE ===================== */
  #site{ visibility:hidden; }
  header{
    position:fixed;
    top:0;left:0;right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:2rem 3rem;
    z-index:200;
    mix-blend-mode:difference;
  }
  header h1{ font-size:1.4rem; letter-spacing:3px; }
  header nav a{
    color:#f5ece0;
    text-decoration:none;
    margin-left:2rem;
    font-size:.85rem;
    letter-spacing:2px;
    text-transform:uppercase;
  }

  #hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    flex-direction:column;
    background:radial-gradient(circle at 50% 50%, #2a1106, #0a0402 70%);
  }
  #hero h2{ font-size:4rem; letter-spacing:2px; }
  #hero p{
    margin-top:1rem; opacity:.6; letter-spacing:2px;
    font-size:.9rem; text-transform:uppercase;
  }
  #scroll-hint{
    margin-top:3rem; font-size:.75rem; letter-spacing:3px;
    opacity:.4; animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0); opacity:.4;}
    50%{ transform:translateY(8px); opacity:.8;}
  }

  /* ===================== CINEMATIC SLIDER ===================== */
  #cinema-section{
    position:relative;
    height:100vh;
    width:100%;
    overflow:hidden;
    perspective:1400px;
  }
  .panel{
    position:absolute;
    inset:0;
    will-change:transform, filter, opacity;
    backface-visibility:hidden;
    transform-style:preserve-3d;
  }
  .layer{
    position:absolute;
    inset:0;
    will-change:transform, filter, opacity;
  }
  .layer-bg{
    background-size:cover;
    background-position:center;
    filter:brightness(0.55) saturate(0.9);
    transform:scale(1.18);
  }
  .layer-video{
    background-size:cover;
    background-position:center;
    transform:scale(1.28);
  }
  .layer-overlay{
    background:
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.55) 100%);
    transform:scale(1.35);
  }
  .layer-vignette{
    background:radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.5) 100%);
    opacity:0;
  }
  .layer-text{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:flex-end;
    padding:0 6vw 17vh;
  }
  .panel-title{
    font-size:4rem;
    letter-spacing:1px;
    color:#fbf3e7;
    text-shadow:0 4px 30px rgba(0,0,0,0.5);
  }
  .panel-sub{
    margin-top:.8rem;
    font-size:.9rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(245,236,224,0.75);
  }
  #cinema-labels{
    position:absolute;
    bottom:2.2rem;
    left:0;right:0;
    display:flex;
    justify-content:center;
    gap:2rem;
    z-index:20;
    pointer-events:none;
  }
  .slide-index{
    font-size:.8rem;
    letter-spacing:3px;
    opacity:.35;
    color:#f5ece0;
    transition:opacity .4s ease;
  }
  .slide-index.active{ opacity:1; }

  footer{
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:#0a0402;
  }
  footer h3{ font-size:2.2rem; letter-spacing:2px; }
  footer p{ margin-top:1rem; opacity:.5; font-size:.85rem; letter-spacing:2px; }
</style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div id="loader-line-guide"></div>
    <div id="loader-line-top"></div>
    <div id="loader-line-bottom"></div>
    <div class="loader-tick" id="tick-0">0</div>
    <div class="loader-tick" id="tick-100">100</div>
    <div id="loader-content">
      <div id="loader-title">Artisun</div>
      <div id="loader-divider">
        <span class="dash"></span>
        <span>LOADING</span>
        <span class="dash right"></span>
      </div>
    </div>
  </div>

  <!-- SITE -->
  <div id="site">
    <header>
      <h1>Artisun</h1>
      <nav>
        <a href="#hero">Home</a>
        <a href="#cinema-section">Gallery</a>
      </nav>
    </header>

    <section id="hero">
      <h2>Artisun</h2>
      <p>Crafted in light, born from fire</p>
      <div id="scroll-hint">Scroll to explore</div>
    </section>

    <section id="cinema-section">
      <!-- panels injected by JS -->
      <div id="cinema-labels">
        <span class="slide-index active" data-i="0">01</span>
        <span class="slide-index" data-i="1">02</span>
        <span class="slide-index" data-i="2">03</span>
        <span class="slide-index" data-i="3">04</span>
        <span class="slide-index" data-i="4">05</span>
      </div>
    </section>

    <footer>
      <h3>Artisun Collection</h3>
      <p>A study in light, distortion and form</p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
  /* =======================================================
     LOADING SCREEN — bars grow from top & bottom to center
  ======================================================= */
  (function(){
    const lineTop = document.getElementById('loader-line-top');
    const lineBottom = document.getElementById('loader-line-bottom');
    const tick0 = document.getElementById('tick-0');
    const tick100 = document.getElementById('tick-100');
    const loader = document.getElementById('loader');
    const site = document.getElementById('site');
    const content = document.getElementById('loader-content');

    let topReach = 0, bottomReach = 0;
    function measure(){
      const rect = content.getBoundingClientRect();
      topReach = Math.max(0, rect.top - 24);
      bottomReach = Math.max(0, window.innerHeight - rect.bottom - 24);
      tick0.style.top = (rect.top - 28) + 'px';
      tick100.style.top = (rect.bottom + 28) + 'px';
    }
    measure();
    window.addEventListener('resize', measure);

    let p = 0;
    const interval = setInterval(()=>{
      p += Math.random()*9 + 3;
      if(p >= 100){
        p = 100;
        clearInterval(interval);
        apply(p);
        setTimeout(()=>{
          loader.classList.add('fade-out');
          site.style.visibility = 'visible';
          document.body.style.overflow = 'auto';
          setTimeout(()=>{
            loader.remove();
            ScrollTrigger.refresh();
          }, 1100);
        }, 300);
        return;
      }
      apply(p);
    }, 180);

    function apply(percent){
      const frac = percent/100;
      lineTop.style.height = (frac * topReach) + 'px';
      lineBottom.style.height = (frac * bottomReach) + 'px';
      tick0.style.opacity = frac > 0.45 ? 1 : 0;
      tick100.style.opacity = frac > 0.45 ? 1 : 0;
    }

    document.body.style.overflow = 'hidden';
  })();

  /* =======================================================
     CINEMATIC DEPTH HORIZONTAL SLIDER
  ======================================================= */
  (function(){
    gsap.registerPlugin(ScrollTrigger);

    const SLIDES = [
      {
        bg:'https://picsum.photos/id/1018/1600/900',
        video:'https://picsum.photos/id/1018/1600/900',
        title:'Solstice',
        sub:'Chapter One — Light'
      },
      {
        bg:'https://picsum.photos/id/1015/1600/900',
        video:'https://picsum.photos/id/1015/1600/900',
        title:'Meridian',
        sub:'Chapter Two — Flow'
      },
      {
        bg:'https://picsum.photos/id/1019/1600/900',
        video:'https://picsum.photos/id/1019/1600/900',
        title:'Aurelia',
        sub:'Chapter Three — Form'
      },
      {
        bg:'https://picsum.photos/id/1016/1600/900',
        video:'https://picsum.photos/id/1016/1600/900',
        title:'Ember',
        sub:'Chapter Four — Heat'
      },
      {
        bg:'https://picsum.photos/id/1021/1600/900',
        video:'https://picsum.photos/id/1021/1600/900',
        title:'Horizon',
        sub:'Chapter Five — Stillness'
      }
    ];

    const section = document.getElementById('cinema-section');
    const labels = document.getElementById('cinema-labels');

    const panels = SLIDES.map((s, i)=>{
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.dataset.index = i;
      panel.style.zIndex = i;
      panel.style.opacity = i === 0 ? '1' : '0';

      panel.innerHTML = `
        <div class="layer layer-bg" style="background-image:url('${s.bg}')"></div>
        <div class="layer layer-video" style="background-image:url('${s.video}')"></div>
        <div class="layer layer-overlay"></div>
        <div class="layer layer-vignette"></div>
        <div class="layer layer-text">
          <div class="panel-title">${s.title}</div>
          <div class="panel-sub">${s.sub}</div>
        </div>
      `;
      section.insertBefore(panel, labels);
      return panel;
    });

    function getLayers(panel){
      return {
        bg: panel.querySelector('.layer-bg'),
        video: panel.querySelector('.layer-video'),
        overlay: panel.querySelector('.layer-overlay'),
        vignette: panel.querySelector('.layer-vignette'),
        text: panel.querySelector('.layer-text'),
        title: panel.querySelector('.panel-title'),
        sub: panel.querySelector('.panel-sub')
      };
    }

    // cubic-bezier(0.22,1,0.36,1) approximation via lookup
    function cubicBezier(p1x,p1y,p2x,p2y){
      function bez(t,a,b){
        const it=1-t;
        return 3*it*it*t*a + 3*it*t*t*b + t*t*t;
      }
      return function(x){
        let t = x;
        for(let i=0;i<8;i++){
          const xEst = bez(t,p1x,p2x) - x;
          const dx = (bez(t+0.001,p1x,p2x) - bez(t,p1x,p2x))/0.001;
          if(Math.abs(dx) < 1e-6) break;
          t -= xEst/dx;
          t = Math.min(1, Math.max(0, t));
        }
        return bez(t,p1y,p2y);
      };
    }
    const ease = cubicBezier(0.22,1,0.36,1);

    const TX_MAIN = 11;     // max % translate for the video layer
    const BG_MULT = 0.43;   // background drifts slower (depth)
    const OVERLAY_MULT = 1.3;
    const TEXT_MULT = 2.4;  // text is transparent-backed, free to move further

    const VIDEO_BASE = 1.28;
    const BG_BASE = 1.18;
    const OVERLAY_BASE = 1.35;

    function setPanelOut(panel, localP){
      const e = ease(localP);
      const L = getLayers(panel);
      const tx = -TX_MAIN * e;
      L.video.style.transform = `translate3d(${tx}%,0,0) scale(${VIDEO_BASE * (1 - 0.03*e)})`;
      L.video.style.filter = `blur(${3*Math.sin(Math.PI*e*0.5)}px) brightness(${100 - 10*e}%)`;
      L.video.style.opacity = 1 - 0.2*e;

      L.bg.style.transform = `translate3d(${tx*BG_MULT}%,0,0) scale(${BG_BASE})`;
      L.overlay.style.transform = `translate3d(${tx*OVERLAY_MULT}%,0,0) scale(${OVERLAY_BASE})`;
      L.text.style.transform = `translate3d(${tx*TEXT_MULT}%,0,0)`;
      L.vignette.style.opacity = Math.sin(Math.PI*e) * 0.12;

      panel.style.transform = `rotateY(${-2*e}deg)`;
      panel.style.opacity = 1;

      L.title.style.opacity = 1 - e;
      L.sub.style.opacity = 1 - e;
    }

    function setPanelIn(panel, localP){
      const e = ease(localP);
      const L = getLayers(panel);
      const tx = TX_MAIN * (1-e);
      L.video.style.transform = `translate3d(${tx}%,0,0) scale(${VIDEO_BASE * (1.05 - 0.05*e)})`;
      L.video.style.filter = `blur(${3*Math.sin(Math.PI*(1-e)*0.5)}px) brightness(${90 + 10*e}%)`;
      L.video.style.opacity = e;

      L.bg.style.transform = `translate3d(${tx*BG_MULT}%,0,0) scale(${BG_BASE})`;
      L.overlay.style.transform = `translate3d(${tx*OVERLAY_MULT}%,0,0) scale(${OVERLAY_BASE})`;
      L.text.style.transform = `translate3d(${40*(1-e) + tx*TEXT_MULT*0.6}px,0,0)`;
      L.vignette.style.opacity = Math.sin(Math.PI*e) * 0.12;

      panel.style.transform = `rotateY(${2*(1-e)}deg)`;
      panel.style.opacity = e;

      L.title.style.opacity = e;
      L.title.style.filter = `blur(${8*(1-e)}px)`;
      L.sub.style.opacity = Math.max(0, e - 0.15) / 0.85;
    }

    function resetPanel(panel, active){
      const L = getLayers(panel);
      panel.style.transform = 'none';
      panel.style.opacity = active ? '1' : '0';
      panel.style.pointerEvents = active ? 'auto' : 'none';
      L.video.style.transform = `translate3d(0,0,0) scale(${VIDEO_BASE})`;
      L.video.style.filter = 'blur(0px) brightness(100%)';
      L.video.style.opacity = '1';
      L.bg.style.transform = `scale(${BG_BASE})`;
      L.overlay.style.transform = `scale(${OVERLAY_BASE})`;
      L.text.style.transform = 'translate3d(0,0,0)';
      L.vignette.style.opacity = '0';
      L.title.style.opacity = active ? '1' : '0';
      L.title.style.filter = 'blur(0px)';
      L.sub.style.opacity = active ? '1' : '0';
    }

    panels.forEach((p,i)=> resetPanel(p, i===0));

    const total = panels.length - 1;
    let currentPair = -1;

    function update(globalProgress){
      const scaled = globalProgress * total;
      let pair = Math.floor(scaled);
      pair = Math.min(pair, total - 1);
      pair = Math.max(pair, 0);
      const localP = scaled - pair;

      panels.forEach((panel, i)=>{
        if(i === pair){
          setPanelOut(panel, localP);
        } else if(i === pair + 1){
          setPanelIn(panel, localP);
        } else {
          resetPanel(panel, false);
        }
      });

      const activeIndex = localP < 0.5 ? pair : pair + 1;
      document.querySelectorAll('.slide-index').forEach(el=>{
        el.classList.toggle('active', parseInt(el.dataset.i) === activeIndex);
      });
    }

    update(0);

    ScrollTrigger.create({
      trigger: '#cinema-section',
      start: 'top top',
      end: '+=400%',
      pin: true,
      scrub: true,
      onUpdate: (self)=> update(self.progress)
    });
  })();
  </script>
</body>
</html>
